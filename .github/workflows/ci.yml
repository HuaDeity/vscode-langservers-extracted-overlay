name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_run:
    workflows:
      - Update vscode-html-languageservice
    types:
      - completed

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wimpysworld/nothing-but-nix@main
        if: matrix.os == 'ubuntu-latest'

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: vscode-langservers-extracted
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        run: nix flake check --no-update-lock-file

      - name: Build packages
        run: nix build .#vscode-html-languageservice .#vscode-langservers-extracted
