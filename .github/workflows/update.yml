name: Update vscode-html-languageservice

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ github.token }}

      - name: Update
        id: update
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          BEFORE=$(git rev-parse HEAD)
          nix run nixpkgs#nix-update -- \
            --flake \
            --commit \
            --write-commit-message /tmp/commit-message \
            --url https://registry.npmjs.org/@zed-industries/vscode-langservers-extracted \
            vscode-html-languageservice
          AFTER=$(git rev-parse HEAD)

          if [[ "$BEFORE" != "$AFTER" ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push and open PR
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "HEAD:refs/heads/bump/vscode-html-languageservice" --force
          # Re-running just force-pushes the existing PR's branch; only create
          # a PR when none is open, so real gh failures aren't masked.
          if [[ "$(gh pr list --head bump/vscode-html-languageservice --state open --json number --jq length)" == "0" ]]; then
            # nix-update's commit message is multi-line (title + npmdiff link);
            # only the first line belongs in the PR title.
            gh pr create \
              --head "bump/vscode-html-languageservice" \
              --title "$(head -n1 /tmp/commit-message)" \
              --body "$(tail -n +2 /tmp/commit-message)

          Automated version bump by [nix-update](https://github.com/Mic92/nix-update)."
          fi
