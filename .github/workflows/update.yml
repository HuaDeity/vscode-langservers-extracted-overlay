name: Update vscode-html-languageservice

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ github.token }}

      - name: Update
        id: update
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          BEFORE=$(git rev-parse HEAD)
          nix run nixpkgs#nix-update -- \
            --flake \
            --commit \
            --write-commit-message /tmp/commit-message \
            --url https://registry.npmjs.org/@zed-industries/vscode-langservers-extracted \
            vscode-html-languageservice
          AFTER=$(git rev-parse HEAD)

          if [[ "$BEFORE" != "$AFTER" ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push and open PR
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "HEAD:refs/heads/bump/vscode-html-languageservice" --force
          gh pr create \
            --head "bump/vscode-html-languageservice" \
            --title "$(cat /tmp/commit-message)" \
            --body "Automated version bump by [nix-update](https://github.com/Mic92/nix-update)." \
            || true
